baseurl = "https://abishevs.dev/"
title = "Eduards Abishevs"
theme = "maker-log"
locale = "en"
# defaultcontentlanguage = "en"

pagination.pagerSize = 20

disqusShortname = "Abishevs"

[markup.highlight]
style = "github-dark"
noClasses = false

[markup.goldmark.renderer]
unsafe = true

[markup.goldmark.extensions.passthrough]
enable = true

[markup.goldmark.extensions.passthrough.delimiters]
inline = [['$', '$'], ['\(', '\)']]
block = [['$$', '$$'], ['\[', '\]']]

[params]
  author = "Eduards Abishevs"

  school = "Mechatronics at Chalmers University of Technology"

  interests = ["Embedded Systems", "Robotics",
  "Cybersecurity", "CAD", "Simulations" ]

  info = [
  "Hej! Mechatronics engineering student here- sharing ideas, projects, build logs and daily workflows. Mostly interested in embedded systems, low-level software and hardware tinkering basicly anything that connects software with the physical world.",
  "`Builder of never ending, always growing projects :D`", ]

  description = "OASIS of Eduards Abishevs"
  keywords = "blog,developer,personal,engineer,robotics, mechatronics"
  avatarurl = "images/profile.png"
  # gravatar = "john.doe@example.com"

  faviconSVG = "/img/favicon.svg"
  favicon_32 = "/img/favicon-32x32.png"
  favicon_16 = "/img/favicon-16x16.png"

  since = 2023

  enableTwemoji = true

  colorScheme = "auto"
  hidecolorschemetoggle = false
  
  katex = true
  math = true

  # customCSS = ["css/custom.css"]
  # customSCSS = ["scss/custom.scss"]
  # customJS = ["js/custom.js"]

  # Pinned projects shown on homepage (paths relative to content/)
  pinnedProjects = ["/projects/modest"]

[params.umami]
  siteID = "849c819c-42c4-449a-959d-964f87f5aad1"
  scriptURL = "https://cloud.umami.is/script.js"


