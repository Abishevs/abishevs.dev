# Track definitions — single source of truth for colors and labels
# Used by: timeline, graph, SCSS (via CSS custom properties)
#
# "section" = Hugo content section name
# "label" = display label
# "color" = hex color
# "timelineOrder" = display order on timeline (omit to exclude from timeline)

# ─── Timeline tracks ─────────────────────────────────────────

[project]
section = "projects"
label = "Projects"
color = "#38BDF8"
timelineOrder = 4

[career]
section = "work-experience"
label = "Career"
color = "#22C55E"
timelineOrder = 1

[education]
section = "education"
label = "Education"
color = "#F59E0B"
timelineOrder = 2

[workflow]
section = "workflows"
label = "Workflows"
color = "#EC4899"
timelineOrder = 3

[book]
section = "books"
label = "Books"
color = "#FB923C"
timelineOrder = 5

# ─── Graph-only tracks (not on timeline) ─────────────────────

[technology]
section = "technologies"
label = "Technologies"
color = "#9F7AEA"

[journal]
section = "project-journal"
label = "Journals"
color = "#6EE7B7"

[post]
section = "posts"
label = "Posts"
color = "#E5E7EB"
