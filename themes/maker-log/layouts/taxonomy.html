{{ define "main" }}
  <header class="page-header">
    <h1 class="page-header__title">{{ .Title }}</h1>
  </header>
  <div class="taxonomy-list">
    {{- range .Pages }}
      <a class="taxonomy-list__term" href="{{ .RelPermalink }}">
        {{ .LinkTitle }}<span class="taxonomy-list__count">{{ len .Pages }}</span>
      </a>
    {{- end }}
  </div>
{{ end }}
