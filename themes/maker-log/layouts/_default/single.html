{{ define "main" }}
  <article>
    <header class="article-header">
      <h1 class="article-title">{{ .Title }}</h1>
      <div class="article-meta">
        {{- with .Date }}<time datetime="{{ . | time.Format "2006-01-02" }}">{{ . | time.Format ":date_long" }}</time>{{ end }}
        {{- with .Params.authors }} · {{ range . }}<span>{{ . }}</span>{{ end }}{{ end }}
      </div>
    </header>
    <div class="article-body">
      {{ .Content }}
    </div>
    {{- partial "terms.html" (dict "taxonomy" "tags" "page" .) }}
  </article>
{{ end }}
