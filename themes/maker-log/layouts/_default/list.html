{{ define "main" }}
  <header class="page-header">
    <h1>{{ .Title }}</h1>
    {{- with .Content }}<div>{{ . }}</div>{{ end }}
  </header>
  <ul class="entry-list">
    {{- range .Pages }}
      <li class="entry-item">
        <h2 class="entry-item__title">
          <a href="{{ .RelPermalink }}">{{ .Title }}</a>
        </h2>
        <div class="entry-item__meta">
          {{- with .Date }}<time datetime="{{ . | time.Format "2006-01-02" }}">{{ . | time.Format ":date_long" }}</time>{{ end }}
        </div>
        {{- with .Summary }}<p class="entry-item__summary">{{ . }}</p>{{ end }}
      </li>
    {{- end }}
  </ul>
{{ end }}
